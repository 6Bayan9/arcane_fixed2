<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANE – Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .box { background:white; border-radius:20px; padding:40px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align:center; margin-bottom:24px; }
        .logo h1 { font-size:24px; color:#667eea; font-weight:700; }
        h2 { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:8px; }
        p { color:#64748b; font-size:14px; margin-bottom:24px; }
        label { font-size:13px; font-weight:600; color:#1e293b; display:block; margin-bottom:6px; }
        .pw-wrap { position:relative; margin-bottom:6px; }
        input[type=password], input[type=text] { width:100%; padding:12px 44px 12px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:14px; outline:none; transition:border 0.2s; }
        input:focus { border-color:#667eea; }
        input.err { border-color:#ef4444; }
        .eye-btn { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#94a3b8; font-size:16px; }
        .eye-btn:hover { color:#667eea; }
        .error-msg { color:#ef4444; font-size:12px; margin-top:4px; margin-bottom:12px; display:none; }
        .error-msg.show { display:block; }
        .strength-bar { height:4px; background:#e2e8f0; border-radius:2px; margin:6px 0 2px; }
        .strength-fill { height:100%; border-radius:2px; transition:all 0.3s; }
        .strength-text { font-size:11px; color:#64748b; margin-bottom:16px; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; transition:all 0.3s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(102,126,234,0.4); }
        .alert-err { background:#fee2e2; color:#991b1b; padding:12px; border-radius:10px; margin-bottom:16px; font-size:14px; }
        .back-link { text-align:center; margin-top:16px; }
        .back-link a { color:#667eea; font-size:13px; text-decoration:none; font-weight:500; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo"><h1>🔐 ARCANE</h1></div>
    <h2>Set New Password</h2>
    <p>Enter your new password below. Make sure it's strong.</p>

    {% if error %}
    <div class="alert-err">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>New Password</label>
        <div class="pw-wrap">
            <input type="password" name="password" id="pw1" placeholder="Create a strong password" oninput="checkStrength()">
            <button type="button" class="eye-btn" onclick="toggle('pw1',this)"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="sbar" style="width:0;background:#ef4444;"></div></div>
        <div class="strength-text" id="stxt"></div>
        <span class="error-msg" id="e1">Password must be 8+ chars with uppercase, lowercase, number & special character</span>

        <label>Confirm Password</label>
        <div class="pw-wrap">
            <input type="password" name="confirm_password" id="pw2" placeholder="Repeat your password" oninput="checkMatch()">
            <button type="button" class="eye-btn" onclick="toggle('pw2',this)"><i class="fas fa-eye"></i></button>
        </div>
        <span class="error-msg" id="e2">Passwords do not match</span>

        <button type="submit" class="btn" onclick="return validate()">Reset Password</button>
    </form>
    <div class="back-link"><a href="/auth">← Back to Sign In</a></div>
</div>
<script>
function toggle(id, btn) {
    const el = document.getElementById(id);
    const icon = btn.querySelector('i');
    el.type = el.type === 'password' ? 'text' : 'password';
    icon.className = el.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
function checkStrength() {
    const pw = document.getElementById('pw1').value;
    const bar = document.getElementById('sbar');
    const txt = document.getElementById('stxt');
    let s = 0;
    if (pw.length >= 8) s++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[^a-zA-Z\d]/.test(pw)) s++;
    if (s <= 1) { bar.style.width='25%'; bar.style.background='#ef4444'; txt.textContent='Weak'; }
    else if (s === 2) { bar.style.width='50%'; bar.style.background='#f59e0b'; txt.textContent='Medium'; }
    else if (s === 3) { bar.style.width='75%'; bar.style.background='#10b981'; txt.textContent='Good'; }
    else { bar.style.width='100%'; bar.style.background='#10b981'; txt.textContent='Strong ✓'; }
}
function checkMatch() {
    const e2 = document.getElementById('e2');
    const pw2 = document.getElementById('pw2');
    if (pw2.value && pw2.value !== document.getElementById('pw1').value) {
        e2.classList.add('show'); pw2.classList.add('err');
    } else { e2.classList.remove('show'); pw2.classList.remove('err'); }
}
function validate() {
    const pw = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const e1 = document.getElementById('e1');
    const e2 = document.getElementById('e2');
    let ok = true;
    const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(pw);
    if (!strong) { e1.classList.add('show'); ok = false; }
    else e1.classList.remove('show');
    if (pw !== pw2) { e2.classList.add('show'); ok = false; }
    else e2.classList.remove('show');
    return ok;
}
</script>
</body>
</html>
